services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    ports:
      - "${LAN_BIND_ADDRESS:-0.0.0.0}:${MQTT_PUBLIC_PORT:-18830}:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sim_platform}
      POSTGRES_USER: ${POSTGRES_USER:-sim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sim_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sim} -d ${POSTGRES_DB:-sim_platform}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  platform-api:
    build:
      context: ./backend
    environment:
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      SIM_ENV: dev
      SITE_ID: site-a
      MQTT_CLIENT_ID: platform-api-compose
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
      API_PORT: ${API_PORT:-8000}
      MQTT_PUBLIC_PORT: ${MQTT_PUBLIC_PORT:-18830}
      STORE_BACKEND: postgresql
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sim}:${POSTGRES_PASSWORD:-sim_password}@postgres:5432/${POSTGRES_DB:-sim_platform}
      WORKSPACE_ID: ${WORKSPACE_ID:-00000000-0000-0000-0000-000000000001}
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      REDIS_RUNTIME_TTL_SECONDS: ${REDIS_RUNTIME_TTL_SECONDS:-86400}
      REDIS_MESSAGE_BUFFER_LIMIT: ${REDIS_MESSAGE_BUFFER_LIMIT:-200}
    ports:
      - "${LAN_BIND_ADDRESS:-0.0.0.0}:${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      mqtt-broker:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  virtual-robot-runner:
    build:
      context: ./robot-executor
    environment:
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      SIM_ENV: dev
      SITE_ID: site-a
      ROBOT_CODE: robot-001
      ROBOT_ID: robot-001
      ROBOT_TYPE: machine-dog
      START_X: 220
      START_Y: 360
      TIME_SCALE: 1.0
      RANDOM_EVENT_RATE: 0.05
    depends_on:
      - mqtt-broker

  frontend:
    build:
      context: ./frontend
    ports:
      - "${LAN_BIND_ADDRESS:-0.0.0.0}:${FRONTEND_PORT:-5173}:80"
    depends_on:
      - platform-api

volumes:
  mqtt_data:
  postgres_data:
  redis_data:
